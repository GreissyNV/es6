<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
  </head>

  <body>
    <h1>Pomodoro</h1>
    <div id="timer" class="timer"></div>
    <label for="sdf">Tiempo inicial en segundos</label>
    <button id="btn-start">Start</button>
    <script>
      const display = document.querySelector("#timer");
      const btnStart = document.querySelector("#btn-start");
      let timeLeft = 10; //TODO Leer este valor desde un imput
      const label = document.getElementById("sdf");

      btnStart.addEventListener("click", () => {
        console.log("Start counter");
        start(timeLeft);
      });

      function updateDisplay(seconds) {
        display.textContent = seconds;
      }

      function start(seconds) {
        updateDisplay(seconds);
        const countDown = setInterval(() => {
          if (seconds > 0) {
            console.clear();
            console.log(seconds);
            seconds--;
            updateDisplay(seconds);
          } else {
            clearInterval(countDown);
            // alert(" se acabó el tiempo!!"); //crear  div para mostrar el mensaje
            document.write("Se acabo el tiempo!");
          }
        }, 1000);
      }

      updateDisplay(timeLeft);
    </script>
  </body>
</html>
